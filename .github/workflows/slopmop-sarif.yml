name: slop-mop code scanning

on:
  push:
    branches: [main, all-pass]
  pull_request_target:
    branches: [main, all-pass]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  scan:
    name: Primary Code Scanning Gate (blocking)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # pull_request_target checks out base branch by default;
          # override to scan the actual PR code.
          # Falls back to github.sha for push/workflow_dispatch.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install "slopmop[all]"

      - name: Run slop-mop scour to SARIF
        id: scour
        continue-on-error: true
        run: |
          source .venv/bin/activate
          sm scour --sarif --output-file slopmop.sarif --no-json

      - name: Publish SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: slopmop.sarif
          category: slopmop

      - name: Summarise SARIF failures
        if: steps.scour.outcome == 'failure'
        run: |
          if [ ! -f slopmop.sarif ]; then
            echo "::error::slopmop scour failed — slopmop.sarif missing"
          else
            python3 -c "
          import json, sys
          from collections import Counter
          try:
              sarif = json.load(open('slopmop.sarif', encoding='utf-8'))
          except Exception as exc:
              print(f'::warning::Unable to parse slopmop.sarif: {exc}')
              sys.exit(0)
          runs = sarif.get('runs') or []
          results = (runs[0].get('results') or []) if runs else []
          if not results:
              print('::error::slopmop scour failed, but SARIF has zero results')
              sys.exit(0)
          counts = Counter(r.get('ruleId', 'unknown') for r in results)
          top = sorted(counts.items(), key=lambda kv: (-kv[1], kv[0]))[:10]
          summary = ', '.join(f'{rule} ({n})' for rule, n in top)
          print(f'::error::Top failing rules: {summary}')
          print('::notice::Open Security -> Code scanning for full findings.')
          "
          fi

      - name: Enforce Primary Gate Verdict
        if: steps.scour.outcome == 'failure'
        run: |
          echo "::error::slopmop scour failed"
          exit 1
